name: Deploy Lambda to S3

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Zip Lambda function
        run: |
          cd lambda
          zip -r lambda_function.zip lambda_function.py
          cd ..

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          aws s3 cp lambda/lambda_function.zip s3://${{ secrets.S3_BUCKET_NAME }}/lambda_function-${TIMESTAMP}.zip
          aws s3 cp lambda/lambda_function.zip s3://${{ secrets.S3_BUCKET_NAME }}/lambda_function-latest.zip
